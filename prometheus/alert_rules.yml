groups:
- name: sarthi_alerts
  rules:
  - alert: HighErrorRate
    expr: rate(sarthi_requests_total{status="500"}[5m]) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "High error rate on Sarthi API"
      description: "More than 5% of requests are failing in the last 5 minutes."

  - alert: HighLatency
    expr: histogram_quantile(0.95, rate(sarthi_request_latency_seconds_bucket[5m])) > 2.0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High latency on Sarthi API"
      description: "95th percentile latency is greater than 2 seconds."

  - alert: HighShieldFlags
    expr: rate(sarthi_shield_flags_total[5m]) > 10
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High number of shield flags"
      description: "Possible coordinated attack or prompt injection attempt detected."
