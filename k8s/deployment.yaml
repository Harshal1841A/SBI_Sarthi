apiVersion: apps/v1
kind: Deployment
metadata:
  name: sarthi-backend
  namespace: sarthi-prod
  labels:
    app: sarthi-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sarthi-backend
  template:
    metadata:
      labels:
        app: sarthi-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: sarthi-backend
        image: sbi-registry.local/sarthi-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: sarthi-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
