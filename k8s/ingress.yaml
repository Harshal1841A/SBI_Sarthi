apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sarthi-ingress
  namespace: sarthi-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m" # For KYC document uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sarthi.sbi.co.in
    secretName: sarthi-tls-secret
  rules:
  - host: sarthi.sbi.co.in
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sarthi-backend
            port:
              number: 80
